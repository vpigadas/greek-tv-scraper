services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  greek-tv-scraper:
    image: ghcr.io/vpigadas/greek-tv-scraper:latest
    env_file:
      - configs/scraper.env
    environment:
      - REDIS_ADDR=redis:6379
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
